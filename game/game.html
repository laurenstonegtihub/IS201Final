<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dodge Game</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
        }

        canvas {
            display: block;
            background: #000;
            cursor: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px #ff0055;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ff0055;
        }

        button {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff77aa;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score">Score: <span id="scoreVal">0</span></div>
        </div>
        <div id="menu">
            <h1>NEON DODGE</h1>
            <p>Avoid the red squares!</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const menu = document.getElementById('menu');

        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let gameActive = false;
        let enemies = [];
        let frameCount = 0;

        const player = {
            x: 200,
            y: 500,
            size: 20,
            color: '#00f2ff'
        };

        // Track mouse movement
        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size / 2;
            player.y = e.clientY - rect.top - player.size / 2;
        });

        function spawnEnemy() {
            const size = Math.random() * 30 + 10;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: Math.random() * 3 + 2 + (score / 100), // Gets faster over time
                color: '#ff0055'
            });
        }

        function startGame() {
            score = 0;
            enemies = [];
            gameActive = true;
            menu.style.display = 'none';
            animate();
        }

        function gameOver() {
            gameActive = false;
            menu.style.display = 'block';
            menu.innerHTML = `<h1>GAME OVER</h1><p>Final Score: ${score}</p><button onclick="startGame()">TRY AGAIN</button>`;
        }

        function animate() {
            if (!gameActive) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Handle Enemies
            frameCount++;
            if (frameCount % 10 === 0) {
                score++;
                scoreElement.innerText = score;
                if (frameCount % 20 === 0) spawnEnemy();
            }

            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;
                
                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                // Collision detection
                if (
                    player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y
                ) {
                    gameOver();
                }

                // Remove enemies off screen
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
